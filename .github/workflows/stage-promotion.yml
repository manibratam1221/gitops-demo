name: Promote to Production

on:
  push:
    branches:
      - main
    paths:
      - "stage/**"

jobs:
  promote:

    runs-on: self-hosted

    concurrency:
      group: production-promotion
      cancel-in-progress: false

    environment:
      name: production

    env:
      PROJECT: gitops-demo
      STAGE: stage

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Cluster Connectivity
        run: |
          kubectl version --client
          kubectl get nodes
          kubectl get stages -n gitops-demo
          kubectl get freight -n gitops-demo

      - name: Install Kargo CLI
        run: |
          if ! command -v kargo >/dev/null 2>&1; then
            curl -L \
              https://github.com/akuity/kargo/releases/latest/download/kargo-linux-amd64 \
              -o kargo

            chmod +x kargo
            sudo mv kargo /usr/local/bin/
          fi

          kargo version

      - name: Login to Kargo
        
        run: |
          set -euo pipefail
          kargo login \
            "${{ secrets.KARGO_SERVER }}" \
            --token "${{ secrets.KARGO_TOKEN }}" \
            --insecure-skip-tls-verify
            
          kargo project list  
          kargo stage list -p "${PROJECT}"

      - name: Save Commit SHA
        run: |
          set -euo pipefail
          echo "COMMIT_SHA=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Wait for Matching Freight
        shell: bash
        run: |
          set -euo pipefail
          echo "Waiting for Freight for commit ${COMMIT_SHA}"

          ATTEMPTS=30

          until [ $ATTEMPTS -eq 0 ]
          do

            FREIGHT=$(kubectl get freight -n gitops-demo -o json \
            | jq -r --arg SHA "$COMMIT_SHA" '
                .items[]
                | select(
                    any(.commits[]?; .id==$SHA)
                )
                | .metadata.name
              ' | head -n1)

            if [[ -n "$FREIGHT" ]]; then

              echo "Matching Freight Found : $FREIGHT"

              echo "FREIGHT_NAME=$FREIGHT" >> $GITHUB_ENV

              exit 0

            fi

            echo "No Freight yet..."

            ATTEMPTS=$((ATTEMPTS-1))

            sleep 10

          done

          echo "Timed out waiting for Freight."

          exit 1

      - name: Display Freight
        run: |
          set -euo pipefail
          echo "Freight = ${FREIGHT_NAME}"

      - name: Promote Freight
        run: |
          set -euo pipefail
          kargo promote \
            -p "${PROJECT}" \
            --stage "${STAGE}" \
            --freight "${FREIGHT_NAME}" \
            --insecure-skip-tls-verify
            

      - name: Wait for Promotion
        run: |
          set -euo pipefail
          echo "Waiting for Promotion..."

          for i in {1..30}; do
            PROMOTION=$(kubectl get promotions -n gitops-demo -o json \
              | jq -r --arg F "$FREIGHT_NAME" '
              .items
              | map(select(.spec.freight == $F))
              | sort_by(.metadata.creationTimestamp)
              | last
              | .metadata.name
              ')
          
            if [[ -n "$PROMOTION" ]]; then
              echo "Promotion found: $PROMOTION"
              break
            fi
          
            sleep 2
          done
      
          if [[ -z "$PROMOTION" ]]; then
            echo "Promotion not found."
            exit 1
          fi 

          
          kubectl wait \
                promotion/$PROMOTION \
                -n gitops-demo \
                --for=jsonpath='{.status.phase}'=Succeeded \
                --timeout=300s

          kubectl get promotion "$PROMOTION" \
                                  -n gitops-demo \
                                  -o wide      

      - name: Verify ArgoCD
        run: |
          set -euo pipefail
         
          kubectl wait \
            application/prod-app \
            -n argocd \
            --for=jsonpath='{.status.health.status}'=Healthy \
            --timeout=300s
          
          SYNC=$(kubectl get application prod-app \
                -n argocd \
                -o jsonpath='{.status.sync.status}')

          if [[ "$SYNC" != "Synced" ]]; then
           echo "Application is not Synced"
           exit 1
          fi       


      - name: Success
        run: |
          echo "Production Promotion Successful 🚀"
