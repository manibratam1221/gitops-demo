name: Promote to Production

on:
  push:
    branches:
      - main
    paths:
      - "stage/**"

jobs:

  promote:

    runs-on: ubuntu-latest

    environment:
      name: production

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Kargo CLI
        run: |
          curl -L https://github.com/akuity/kargo/releases/latest/download/kargo-linux-amd64 \
            -o kargo
          chmod +x kargo
          sudo mv kargo /usr/local/bin/

      - name: Login
        run: |
          kargo login \
            ${{ secrets.KARGO_SERVER }} \
            --token ${{ secrets.KARGO_TOKEN }}

      - name: Wait for Freight
        run: |
          echo "Waiting for Freight..."

          for i in {1..30}; do

            FREIGHT=$(kargo get freight \
              -p gitops-demo \
              -o json | jq -r '.[0].metadata.name')

            if [ "$FREIGHT" != "" ]; then
              echo "Freight found: $FREIGHT"
              break
            fi

            sleep 10

          done

      - name: Promote
        run: |
          kargo promote \
            -p gitops-demo \
            --stage stage
